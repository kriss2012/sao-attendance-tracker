<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — SAO Attendance Tracker'">SAO Attendance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/sao-theme.css}"/>
</head>
<body>
<div th:fragment="topbar" class="topbar">
    <div class="brand">CARDINAL<span>::</span>ATTENDANCE</div>
    <div class="status-cluster">
        <div class="link-indicator">
            <span class="dot"></span>
            <span>SYSTEM LINKED</span>
        </div>
        <div data-system-clock class="mono">00:00:00</div>
        <a th:href="@{/dashboard}" class="btn btn-ghost btn-sm">DASHBOARD</a>
    </div>
</div>
</body>
</html>
