<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Player Login')}"></head>
<body>

<div class="splash">
    <div class="ring-decor"></div>
    <div class="ring-decor r2"></div>

    <div class="eyebrow">CARDINAL SYSTEM // MEMBER LOGIN</div>
    <h1>PLAYER <span>LOGIN</span></h1>
    <p class="sub">
        Use your roll number to access your profile and attendance history directly.
        The app stores all data in the MySQL database named <strong>Kirito</strong>.
    </p>

    <form th:action="@{/login}" method="post" class="login-form">
        <input type="text" name="rollNumber" placeholder="Enter roll number" required="required" autofocus="autofocus"/>
        <button type="submit" class="link-btn">SIGN IN</button>
    </form>

    <div th:if="${errorMsg}" class="flash error" th:text="${errorMsg}"></div>
    <div th:if="${successMsg}" class="flash" th:text="${successMsg}"></div>
    <p class="muted small">If you're already registered, your profile and attendance history will load immediately.</p>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
