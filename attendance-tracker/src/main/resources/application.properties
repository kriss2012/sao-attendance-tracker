# =========================================================
# SAO Attendance Tracker - application configuration
# =========================================================

spring.application.name=attendance-tracker

# ---------------------------------------------------------
# Database - H2 in-memory, zero setup required to run the project.
# Data resets on every restart; DemoDataSeeder re-populates it.
# Visit http://localhost:8080/h2-console (JDBC URL below) to inspect data.
# ---------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:attendancedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------
# To use MySQL instead of H2 (matches the original project setup):
# 1. Add nothing extra - the mysql-connector-j driver is already on the classpath.
# 2. Comment out the H2 datasource block above.
# 3. Uncomment and fill in the block below.
# ---------------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/attendance_db
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------------
# Google Sheets integration
# See README.md -> "Connecting your Google Sheet" for the full setup guide.
# ---------------------------------------------------------
googlesheets.application-name=SAO Attendance Tracker
# Path to the service-account JSON key, loaded as a classpath resource.
# Place your downloaded key at src/main/resources/credentials/google-credentials.json
googlesheets.credentials-path=classpath:credentials/google-credentials.json
# The spreadsheet ID from your sheet's URL:
# https://docs.google.com/spreadsheets/d/{THIS_PART}/edit
googlesheets.spreadsheet-id=1M78OGUbCN2GROD6gkW3BLGeqoPKz92ANrgEtqKZyuXg
# Sheet name + column range containing: RollNumber | Name | Guild | Date | Status
googlesheets.range=Sheet1!A:E

# ---------------------------------------------------------
# Server
# ---------------------------------------------------------
server.port=8080
server.error.include-message=always
