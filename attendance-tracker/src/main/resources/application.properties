# =========================================================
# SAO Attendance Tracker - application configuration
# =========================================================

spring.application.name=attendance-tracker

# =========================================================
# SAO Attendance Tracker - application configuration
# =========================================================

spring.application.name=attendance-tracker

# ---------------------------------------------------------
# Database - MySQL
# ---------------------------------------------------------
# Create the database first in your MySQL server:
#   CREATE DATABASE Kirito;
#   USE Kirito;
# Then start the app with the credentials below.
spring.datasource.url=jdbc:mysql://localhost:3306/Kirito?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=12345
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------
# Server
# ---------------------------------------------------------
server.port=8080
server.error.include-message=always
